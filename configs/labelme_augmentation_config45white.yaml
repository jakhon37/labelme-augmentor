# LabelMe Augmentation Configuration - Updated Class Distribution
# Complete configuration for flexible augmentation with per-class settings
# Target: ~1,700-1,800 samples per class for balanced dataset

# General settings
general:
  seed: 42
  num_workers: null  # null = auto-detect cores, or specify number
  log_level: DEBUG  # File logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL  
  enable_base64: false  # Set to false to save disk space and processing time
  checkpoint_file: "augmentation_checkpoint.json"  # Resume from checkpoint
  resume_from_checkpoint: true  # Enable checkpoint/resume functionality
  
# Logging configuration
logging:
  log_to_file: true          # Save logs to file
  log_to_console: true       # Show logs in console
  console_level: ERROR       # Console level (less verbose than file)
  log_filename: null         # null = auto-generate with timestamp
  # log_filename: "my_augmentation.log"  # Or specify custom name

# Input/Output paths
paths:
  input_json_dir: "/home/aoi-linux/workspace/defecTRAIN/DATA/data_15_45_75/WHITE45/white45__crp_chunk02_13/defect_split_even/train"  # Directory with original LabelMe JSON files
  output_dir: "/home/aoi-linux/workspace/defecTRAIN/DATA/data_15_45_75/WHITE45/white45__crp_chunk02_13/defect_split_even/train_aug_02_13"

  # input_json_dir: "/home/aoi-linux/workspace/defecTRAIN/DATA/data_15_45_75/WHITE45/white45__crp_chunk02_13/defect_split_even/val"  # Directory with original LabelMe JSON files
  # output_dir: "/home/aoi-linux/workspace/defecTRAIN/DATA/data_15_45_75/WHITE45/white45__crp_chunk02_13/defect_split_even/val_aug_02_13"

  
# Output structure
output:
  images_subdir: "imagesLB"
  annotations_subdir: "imagesLB"
  debug_subdir: "debug"
  create_debug_visualizations: true

# Global augmentation settings (applied to all classes unless overridden)
global_augmentations:
  num_augmentations_per_image: 0  # How many augmented versions per image
  
  # Augmentation pipeline
  transforms:
    - name: HorizontalFlip
      probability: 0.5
      params: {}
      
    - name: VerticalFlip
      probability: 0.3
      params: {}
      
    - name: RandomRotate90
      probability: 0.5
      params: {}
      
    - name: Rotate
      probability: 0.4
      params:
        limit: 30
        border_mode: 0
        
    - name: ShiftScaleRotate
      probability: 0.5
      params:
        shift_limit: 0.1
        scale_limit: 0.15
        rotate_limit: 15
        border_mode: 0
        
    - name: OpticalDistortion
      probability: 0.3
      params:
        distort_limit: 0.05
        border_mode: 0
        
    - name: GridDistortion
      probability: 0.2
      params:
        num_steps: 5
        distort_limit: 0.3
        border_mode: 0
        
    - name: ElasticTransform
      probability: 0.2
      params:
        alpha: 1.0
        sigma: 50.0
        border_mode: 0
        
    - name: PadIfNeeded
      probability: 0.2
      params:
        min_height: 384
        min_width: 384
        border_mode: 0
        
    - name: Transpose
      probability: 0.2
      params: {}
      
    - name: RandomBrightnessContrast
      probability: 0.2
      params:
        brightness_limit: 0.1
        contrast_limit: 0.1


