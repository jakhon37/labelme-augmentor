# MkDocs configuration for LabelMe Augmentor

site_name: LabelMe Augmentor
site_description: Advanced data augmentation tool for LabelMe annotated datasets
site_author: Your Name
site_url: https://yourusername.github.io/labelme-augmentor

repo_name: yourusername/labelme-augmentor
repo_url: https://github.com/yourusername/labelme-augmentor

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - User Guide:
    - Configuration: configuration.md
    - Examples: examples/index.md
  - API Reference:
    - Overview: api/index.md
    - Core: api/core.md
    - I/O: api/io.md
    - Validation: api/validation.md
    - Configuration: api/config.md
  - Development:
    - Architecture: architecture.md
    - Contributing: contributing.md
    - Changelog: ../CHANGELOG.md
